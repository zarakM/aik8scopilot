# Test pod that enters CrashLoopBackOff immediately.
#
# It prints a realistic-looking error log then exits 1, so kubectl-ai diagnose
# has meaningful logs, events, and container status to work with.
#
# Deploy:  kubectl apply -f testdata/crashloop-pod.yaml
# Watch:   kubectl get pod crashloop-test -w
# Diagnose: ./kubectl-ai diagnose crashloop-test
# Cleanup: kubectl delete -f testdata/crashloop-pod.yaml

apiVersion: v1
kind: Pod
metadata:
  name: crashloop-test
  labels:
    app: crashloop-test
    purpose: kubectl-ai-testing
spec:
  # restartPolicy: Always (the default) is what causes CrashLoopBackOff.
  # Kubernetes backs off exponentially: 10s → 20s → 40s → ... → 5m between restarts.
  restartPolicy: Always

  containers:
    - name: app
      image: busybox:1.36
      # Simulate a realistic app startup failure: print structured logs then exit 1.
      # This gives Claude useful log content to diagnose rather than an empty crash.
      command:
        - sh
        - -c
        - |
          echo "[INFO]  Starting app server v1.2.3"
          echo "[INFO]  Loading config from /etc/app/config.yaml"
          echo "[ERROR] Failed to connect to database: dial tcp 10.0.0.5:5432: connect: connection refused"
          echo "[ERROR] Retrying... (attempt 1/3)"
          sleep 1
          echo "[ERROR] Retrying... (attempt 2/3)"
          sleep 1
          echo "[ERROR] Retrying... (attempt 3/3)"
          echo "[FATAL] Could not establish database connection after 3 attempts. Exiting."
          exit 1

      # Resource requests give Claude context for resource-limit diagnosis paths.
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

      # Reference a missing env var to add a second diagnostic angle.
      env:
        - name: DATABASE_URL
          value: "postgres://10.0.0.5:5432/myapp"
        - name: APP_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secret   # this secret does not exist — adds a Warning event
              key: token
              optional: true     # optional:true means the pod still starts (crash is from exit 1)
